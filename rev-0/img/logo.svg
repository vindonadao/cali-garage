<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="Cali Garage Reparos Automotivos">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Shrikhand&display=swap');
      .cg-text { font-family: 'Shrikhand', 'Anton', 'Bebas Neue', sans-serif; fill: currentColor; }
    </style>
    <filter id="cg-rough" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="7" />
      <feDisplacementMap in="SourceGraphic" scale="2.5" />
    </filter>
  </defs>

  <g class="cg-text" filter="url(#cg-rough)">
    <!-- CALI -->
    <text x="40" y="160" font-size="180" transform="rotate(-4 240 140)">CALI</text>

    <!-- Star -->
    <g transform="translate(595, 105)">
      <path d="M0,-55 L16.2,-17 L55,-17 L22.2,6.5 L35.6,44.5 L0,22 L-35.6,44.5 L-22.2,6.5 L-55,-17 L-16.2,-17 Z" />
    </g>

    <!-- Swoosh underline -->
    <path d="M70 220 Q310 260 590 200" stroke="currentColor" stroke-width="16" fill="none" stroke-linecap="round" />

    <!-- GARAGE -->
    <text x="270" y="335" font-size="135" transform="rotate(4 470 310)">GARAGE</text>
  </g>
</svg>
