name: Deploy rev-0.1 to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'rev-0.1/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload rev-0.1 as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./rev-0.1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
